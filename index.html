<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Extender | Configurator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Rajdhani for Tech feel, Inter for Clean body -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- JSZip for ZIP generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="glow-overlay"></div>
    
    <nav class="navbar">
        <div class="brand">
            <span class="tech-text">ESP32</span><span class="sub-text">EXTENDER</span>
        </div>
        <div class="lang-switcher">
            <button id="lang-en" class="active">EN</button>
            <button id="lang-tr">TR</button>
        </div>
    </nav>

    <main class="content">
        <div class="glass-card">
            <div class="card-header">
                <h2 id="ui-title">WIFI CONFIGURATOR</h2>
                <p id="ui-subtitle">Configure your extender and download the local source code.</p>
            </div>

            <div class="config-grid">
                <!-- Target Network -->
                <div class="input-section">
                    <h3 id="ui-target-title">TARGET NETWORK</h3>
                    <div class="input-group">
                        <label id="ui-target-ssid-label">SSID (WiFi Name)</label>
                        <input type="text" id="target-ssid" placeholder="Home_WiFi">
                    </div>
                    <div class="input-group">
                        <label id="ui-target-pass-label">Password</label>
                        <input type="password" id="target-pass" placeholder="********">
                    </div>
                </div>

                <!-- Extended Network -->
                <div class="input-section">
                    <h3 id="ui-new-title">EXTENDED NETWORK</h3>
                    <div class="input-group">
                        <label id="ui-new-ssid-label">New SSID</label>
                        <input type="text" id="new-ssid" placeholder="ESP32_Extender">
                    </div>
                    <div class="input-group">
                        <label id="ui-new-pass-label">New Password</label>
                        <input type="password" id="new-pass" placeholder="Minimum 8 chars">
                    </div>
                </div>
            </div>

            <button id="download-btn" class="main-btn">
                <span id="ui-download-text">GENERATE & DOWNLOAD (.ZIP)</span>
            </button>
            
            <p class="hint-text" id="ui-hint">The ZIP will contain the pre-configured .ino file and a setup guide.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Developed with <span class="heart">❤</span> by IEB STUDIO</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
