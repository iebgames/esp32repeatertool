<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEB Studio | ESP32 WiFi Extender</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <!-- Premium effects containers -->
    <div class="grain-overlay"></div>
    <div class="orbs-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <nav class="navbar">
        <div class="logo">
            <span class="ieb">IEB</span><span class="studio">STUDIO</span>
            <div class="tag">WIFI INFRA</div>
        </div>
        <div class="nav-right">
            <div class="lang-pill">
                <button id="lang-en" class="active">EN</button>
                <button id="lang-tr">TR</button>
            </div>
        </div>
    </nav>

    <main>
        <div class="main-card">
            <div class="glass-morph"></div>
            
            <header>
                <h1 id="ui-title">WIFI CONFIGURATOR</h1>
                <p id="ui-subtitle">Premium extender setup for professional network expansion.</p>
            </header>

            <div class="form-container">
                <div class="input-block">
                    <div class="block-label" id="ui-target-title">SOURCE NETWORK</div>
                    <div class="input-field">
                        <label id="ui-target-ssid-label">SSID</label>
                        <input type="text" id="target-ssid" spellcheck="false">
                    </div>
                    <div class="input-field">
                        <label id="ui-target-pass-label">PASSWORD</label>
                        <input type="password" id="target-pass">
                    </div>
                </div>

                <div class="divider"></div>

                <div class="input-block">
                    <div class="block-label" id="ui-new-title">EXTENDED NETWORK</div>
                    <div class="input-field">
                        <label id="ui-new-ssid-label">NEW SSID</label>
                        <input type="text" id="new-ssid" value="IEB_Extender" spellcheck="false">
                    </div>
                    <div class="input-field">
                        <label id="ui-new-pass-label">NEW PASSWORD</label>
                        <input type="password" id="new-pass">
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="download-btn" class="ieb-btn">
                    <div class="btn-glow"></div>
                    <span id="ui-download-text">DEPLOY & DOWNLOAD (.ZIP)</span>
                </button>
                <p class="footer-hint" id="ui-hint">Auto-configured source code & setup manual included.</p>
            </div>
        </div>
    </main>

    <footer class="ieb-footer">
        <p>© 2026 <span class="ieb-mini">IEB STUDIO</span>. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
